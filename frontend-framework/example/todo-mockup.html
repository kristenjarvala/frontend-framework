<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Todo App - Static Mockup</title>
    <style>
        /* ===================================
           RESET & BASE STYLES
           =================================== */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 
                         'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #app {
            width: 100%;
            max-width: 600px;
        }

        /* ===================================
           TODO CONTAINER
           =================================== */

        .todo-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* ===================================
           HEADER
           =================================== */

        .todo-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem;
            text-align: center;
        }

        .todo-title {
            color: white;
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        /* ===================================
           ADD TODO SECTION
           =================================== */

        .add-todo-section {
            padding: 1.5rem;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            gap: 0.75rem;
        }

        .todo-input {
            flex: 1;
            padding: 0.875rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .todo-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .todo-input::placeholder {
            color: #adb5bd;
        }

        .add-button {
            padding: 0.875rem 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .add-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .add-button:disabled {
            background: #ced4da;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* ===================================
           FILTER SECTION
           =================================== */

        .filter-section {
            padding: 1rem 1.5rem;
            background: white;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }

        .filter-btn {
            padding: 0.5rem 1.25rem;
            background: #f8f9fa;
            color: #495057;
            border: 2px solid transparent;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            background: #e9ecef;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        /* ===================================
           TODO LIST
           =================================== */

        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            background: white;
            border-bottom: 1px solid #f1f3f5;
            transition: all 0.3s ease;
        }

        .todo-item:hover {
            background: #f8f9fa;
            transform: translateX(4px);
        }

        .todo-item.done {
            opacity: 0.6;
        }

        .todo-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
            flex-shrink: 0;
        }

        .todo-text {
            flex: 1;
            font-size: 1rem;
            color: #333;
            word-break: break-word;
        }

        .todo-item.done .todo-text {
            text-decoration: line-through;
            color: #999;
        }

        .delete-button {
            width: 32px;
            height: 32px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            font-weight: 300;
            line-height: 1;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .delete-button:hover {
            background: #c0392b;
            transform: scale(1.1) rotate(90deg);
        }

        /* ===================================
           FOOTER / STATS
           =================================== */

        .todo-footer {
            padding: 1rem 1.5rem;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
        }

        .todo-stats {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
            color: #6c757d;
            font-weight: 500;
        }

        .stat {
            display: inline-block;
        }

        .stat-separator {
            color: #dee2e6;
        }

        /* ===================================
           SCROLLBAR STYLING
           =================================== */

        .todo-list::-webkit-scrollbar {
            width: 8px;
        }

        .todo-list::-webkit-scrollbar-track {
            background: #f1f3f5;
        }

        .todo-list::-webkit-scrollbar-thumb {
            background: #ced4da;
            border-radius: 4px;
        }

        .todo-list::-webkit-scrollbar-thumb:hover {
            background: #adb5bd;
        }

        /* ===================================
           RESPONSIVE DESIGN
           =================================== */

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .todo-title {
                font-size: 1.5rem;
            }

            .add-todo-section {
                flex-direction: column;
                gap: 0.5rem;
            }

            .add-button {
                width: 100%;
                padding: 1rem;
            }

            .filter-section {
                flex-wrap: wrap;
            }

            .todo-item {
                padding: 0.875rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="todo-container">
            <!-- Header -->
            <header class="todo-header">
                <h1 class="todo-title">📝 My Todo List</h1>
            </header>

            <!-- Add Todo Section -->
            <div class="add-todo-section">
                <input 
                    type="text" 
                    class="todo-input" 
                    placeholder="What needs to be done? (min 3 chars)"
                    value=""
                >
                <button class="add-button">Add Todo</button>
            </div>

            <!-- Filter Buttons -->
            <div class="filter-section">
                <button class="filter-btn active">All</button>
                <button class="filter-btn">Active</button>
                <button class="filter-btn">Completed</button>
            </div>

            <!-- Todo List -->
            <ul class="todo-list">
                <!-- Todo Item 1 (Active) -->
                <li class="todo-item">
                    <input type="checkbox" class="todo-checkbox">
                    <span class="todo-text">Walk the dog</span>
                    <button class="delete-button">×</button>
                </li>

                <!-- Todo Item 2 (Active) -->
                <li class="todo-item">
                    <input type="checkbox" class="todo-checkbox">
                    <span class="todo-text">Water the plants</span>
                    <button class="delete-button">×</button>
                </li>

                <!-- Todo Item 3 (Completed) -->
                <li class="todo-item done">
                    <input type="checkbox" class="todo-checkbox" checked>
                    <span class="todo-text">Sand the chairs</span>
                    <button class="delete-button">×</button>
                </li>

                <!-- Todo Item 4 (Active) -->
                <li class="todo-item">
                    <input type="checkbox" class="todo-checkbox">
                    <span class="todo-text">Buy groceries</span>
                    <button class="delete-button">×</button>
                </li>

                <!-- Todo Item 5 (Active) -->
                <li class="todo-item">
                    <input type="checkbox" class="todo-checkbox">
                    <span class="todo-text">Finish homework</span>
                    <button class="delete-button">×</button>
                </li>
            </ul>

            <!-- Footer with Stats -->
            <footer class="todo-footer">
                <div class="todo-stats">
                    <span class="stat">Total: 5</span>
                    <span class="stat-separator">•</span>
                    <span class="stat">Active: 4</span>
                    <span class="stat-separator">•</span>
                    <span class="stat">Done: 1</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
